name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-14
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: zig fmt --check
        run: zig fmt --check src/ build.zig

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test --summary all

  cross-compile-sanity:
    name: cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-gnu
          - aarch64-macos
          - x86_64-linux-gnu
          - x86_64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: zig build -Dtarget=${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }}
